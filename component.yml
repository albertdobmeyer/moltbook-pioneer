# yaml-language-server: $schema=../../schemas/component.schema.json

identity:
  id: moltbook-pioneer
  name: Moltbook Pioneer
  version: "0.1.0"
  description: Safe reconnaissance and participation in the Moltbook agentic social network
  role: network
  icon: users
  color: "#a855f7"
  repo: https://github.com/gitgoodordietrying/moltbook-pioneer

status:
  states:
    - id: ready
      label: Ready
      icon: circle-check
      color: "#22c55e"
    - id: not_setup
      label: Not Set Up
      icon: circle-help
      color: "#a855f7"
    - id: error
      label: Error
      icon: alert-triangle
      color: "#ef4444"
  probes:
    - command: "test -f config/.env && echo ready"
      interval_seconds: 30
      timeout_seconds: 5
      rules:
        - stdout_contains: "ready"
          state: ready
        - exit_code: 1
          state: not_setup
  default_state: not_setup

commands:
  # ── Operations ──────────────────────────────────────────
  - id: feed-scan
    name: Scan Feed
    description: Scan recent Moltbook posts for prompt injection patterns
    group: operations
    type: action
    danger: safe
    command: "./tools/feed-scanner.sh --recent ${count}"
    args:
      - id: count
        name: Post count
        description: Number of recent posts to scan
        type: number
        required: false
        default: 50
    output:
      format: ansi
      display: report
    available_when:
      - ready
    sort_order: 10
    timeout_seconds: 60

  - id: feed-scan-agent
    name: Scan Agent
    description: Scan posts by a specific agent handle for injection patterns
    group: operations
    type: action
    danger: safe
    command: "./tools/feed-scanner.sh --agent ${handle}"
    args:
      - id: handle
        name: Agent handle
        description: Moltbook agent handle to scan
        type: string
        required: true
    output:
      format: ansi
      display: report
    available_when:
      - ready
    sort_order: 20
    timeout_seconds: 60

  - id: agent-census
    name: Agent Census
    description: Pull current platform stats from the Moltbook API
    group: operations
    type: action
    danger: safe
    command: "./tools/agent-census.sh"
    output:
      format: ansi
      display: table
    available_when:
      - ready
    sort_order: 30
    timeout_seconds: 30

  - id: census-trend
    name: Census Trend
    description: Show trend data from saved census snapshots
    group: operations
    type: action
    danger: safe
    command: "./tools/agent-census.sh --trend"
    output:
      format: ansi
      display: table
    available_when:
      - ready
    sort_order: 40
    timeout_seconds: 15

  # ── Monitoring ──────────────────────────────────────────
  - id: identity-check
    name: Identity Checklist
    description: Pre-flight safety check before registering an agent on Moltbook
    group: monitoring
    type: query
    danger: safe
    command: "./tools/identity-checklist.sh"
    output:
      format: ansi
      display: checklist
    available_when:
      - ready
    sort_order: 10
    timeout_seconds: 15

  # ── Lifecycle ───────────────────────────────────────────
  - id: setup
    name: Setup
    description: Copy example config and prepare working directory
    group: lifecycle
    type: action
    danger: safe
    command: "cp config/.env.example config/.env && mkdir -p data && echo 'Setup complete — edit config/.env to configure'"
    output:
      format: ansi
      display: terminal
    available_when:
      - not_setup
    sort_order: 10
    timeout_seconds: 10

configs:
  - path: config/.env
    name: Environment
    description: API keys, agent identity, rate limits
    format: env
    editable: true
    danger: caution
  - path: config/feed-allowlist.yml
    name: Feed Allowlist
    description: Trusted agent handles and safe content patterns
    format: yaml
    editable: true
    danger: safe
  - path: config/injection-patterns.yml
    name: Injection Patterns
    description: Prompt injection signatures for the feed scanner
    format: yaml
    editable: true
    danger: caution

prerequisites:
  container_runtime: false
  setup_command: setup
  config_files:
    - path: config/.env
      template: config/.env.example
      description: API keys, agent identity, rate limits
  check_command: test -f config/.env

health:
  - id: config-status
    name: Config
    command: "test -f config/.env && echo configured || echo missing"
    interval_seconds: 60
    timeout_seconds: 5
    parse:
      type: regex
      expression: "(configured|missing)"
      format: "{value}"
    thresholds:
      green: "== configured"
      red: "== missing"
